<input id="nameInput" placeholder="اكتب اسمك">
<br>
<button onclick="run()">اكشف مثلثك</button>

const allNames = rawNames;

const freqMap = {};
allNames.forEach(n=>{
  freqMap[n] = (freqMap[n] || 0) + 1;
});

const single = allNames.filter(n=>!n.includes(" "));

function normalize(str){
return str.replace(/[ًٌٍَُِّْ]/g,'')
.replace(/[أإآ]/g,'ا')
.replace(/^ال/,'')
.replace(/\s/g,'');
}

// 🔥 الدالة الجديدة (الصوت)
function prefixMatchLen(a,b){
  let i=0;
  while(i<a.length && i<b.length && a[i]===b[i]) i++;
  return i;
}

// 🔥 التقييم المطور
function scoreName(name,input,covered=[]){

let p = normalize(name);
let score = 0;

// 🔥 التطابق الصوتي
let prefixLen = prefixMatchLen(p, input);
score += prefixLen * 5;

if(prefixLen >= 2) score += 5;
if(prefixLen === 0) score -= 3;

// عامل الطول
score -= p.length * 0.3;

// باقي النظام القديم
let i=0;
for(let c of p){
if(c===input[i]) i++;
}
if(i>=2) score += 5;

for(let ch of input){
if(p.includes(ch)) score += 2;
}

for(let ch of input){
if(p.includes(ch) && !covered.includes(ch)) score += 3;
}

score += (freqMap[name] - 1);

return score;
}

function pickBest(list,input,covered=[],used=[]){

let best=null, max=-1;

for(let n of list){

if(used.includes(n)) continue;

let s = scoreName(n,input,covered);

if(s>max){
max=s;
best=n;
}
}

return best;
}

function highlight(name,input){
let r="";
if(name.startsWith("ال")){
r+="ال"; name=name.slice(2);
}
for(let ch of name){
if(input.includes(ch)) r+=`<span class="highlight">${ch}</span>`;
else r+=ch;
}
return r;
}

function explainSmart(name,input,role){

let p = normalize(name);
let letters = [];

for(let ch of input){
if(p.includes(ch)) letters.push(ch);
}

let text = "";

if(role==="start")
text += "يمثل بداية المثلث لأنه الأقرب صوتياً لبداية الاسم. ";

if(role==="end")
text += "يمثل نهاية المثلث وفق تطابق الحروف. ";

if(role==="balance")
text += "تم اختياره لإكمال التوازن. ";

if(letters.length)
text += "يغطي الحروف: " + letters.join(" + ") + ". ";

return text;
}

function run(){

let input=normalize(document.getElementById("nameInput").value);
if(!input) return;

let used=[];

let n1 = pickBest(single,input,[],used);
used.push(n1);

let n2 = pickBest(single,input,[],used);
used.push(n2);

let covered=[];
[n1,n2].forEach(n=>{
let p=normalize(n);
for(let ch of input){
if(p.includes(ch)) covered.push(ch);
}
});

let n3 = pickBest(single,input,covered,used);

let coveredSet = new Set();
[n1,n2,n3].forEach(n=>{
let p=normalize(n);
for(let ch of input){
if(p.includes(ch)) coveredSet.add(ch);
}
});

let allLetters = [...input];
let coveredLetters = [...coveredSet];
let missing = allLetters.filter(c=>!coveredSet.has(c));

document.getElementById("result").innerHTML = `
<div class="triangle">
<svg width="340" height="280">
<polygon points="170,20 320,250 20,250"
style="fill:none;stroke:#00ffcc;stroke-width:2"/>
</svg>

<div class="point top">${highlight(n1,input)}</div>
<div class="point right">${highlight(n2,input)}</div>
<div class="point left">${highlight(n3,input)}</div>
</div>

<div class="cards">
<div class="card"><h3>${n1}</h3><p>${explainSmart(n1,input,"start")}</p></div>
<div class="card"><h3>${n2}</h3><p>${explainSmart(n2,input,"end")}</p></div>
<div class="card"><h3>${n3}</h3><p>${explainSmart(n3,input,"balance")}</p></div>
</div>

<div class="summary">
تم تغطية الحروف: ${coveredLetters.join(" + ")} <br>
الحروف الأقل ظهورًا: ${missing.join(" + ") || "لا يوجد"}
</div>
`;
}

</script>
