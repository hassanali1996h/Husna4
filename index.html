<br>
<button onclick="run()">اكشف مثلثك</button>

const freqMap = {};
rawNames.forEach(n=> freqMap[n]=(freqMap[n]||0)+1);

const single = rawNames.filter(n=>!n.includes(" "));

function normalize(str){
return str.replace(/[ًٌٍَُِّْ]/g,'')
.replace(/[أإآ]/g,'ا')
.replace(/^ال/,'')
.replace(/\s/g,'');
}

function prefixMatchLen(a,b){
let i=0;
while(i<a.length && i<b.length && a[i]===b[i]) i++;
return i;
}

function scoreName(name,input,covered=[]){

let p = normalize(name);
let score = 0;

// التسلسل
let seq=0,i=0;
for(let c of p){
if(c===input[i]){ seq++; i++; }
}

// التغطية
let newCoverage=0;
for(let ch of input){
if(p.includes(ch) && !covered.includes(ch)) newCoverage++;
}

if(newCoverage>0){
score += newCoverage*12;
score += seq*6;
}

// الصوت
let prefix = prefixMatchLen(p,input);
score += prefix*5;

// النظافة
score += (newCoverage/p.length)*8;
score -= p.length*0.3;

// عام
for(let ch of input){
if(p.includes(ch)) score+=2;
}

score += (freqMap[name]-1);

return score;
}

function pickBest(list,input,covered=[],used=[]){

let best=null,max=-1;
let remaining=input.split('').filter(c=>!covered.includes(c));

for(let n of list){

if(used.includes(n)) continue;

let p=normalize(n);

// 🔥 شرط إجباري
if(remaining.length){
if(!remaining.some(c=>p.includes(c))) continue;
}

let s=scoreName(n,input,covered);

if(s>max){ max=s; best=n; }
}

return best;
}

function highlight(name,input){
let r="";
if(name.startsWith("ال")){
r+="ال"; name=name.slice(2);
}
for(let ch of name){
if(input.includes(ch)) r+=`<span class="highlight">${ch}</span>`;
else r+=ch;
}
return r;
}

function run(){

let input=normalize(document.getElementById("nameInput").value);
if(!input) return;

let used=[];

let n1=pickBest(single,input,[],used);
used.push(n1);

let n2=pickBest(single,input,[],used);
used.push(n2);

let covered=[];
[n1,n2].forEach(n=>{
let p=normalize(n);
for(let ch of input){
if(p.includes(ch)) covered.push(ch);
}
});

let n3=pickBest(single,input,covered,used);

let coveredSet=new Set();
[n1,n2,n3].forEach(n=>{
let p=normalize(n);
for(let ch of input){
if(p.includes(ch)) coveredSet.add(ch);
}
});

let missing=[...input].filter(c=>!coveredSet.has(c));

document.getElementById("result").innerHTML=`
<div class="triangle">
<svg width="340" height="280">
<polygon points="170,20 320,250 20,250"
style="fill:none;stroke:#00ffcc;stroke-width:2"/>
</svg>

<div class="point top">${highlight(n1,input)}</div>
<div class="point right">${highlight(n2,input)}</div>
<div class="point left">${highlight(n3,input)}</div>
</div>

<div class="summary">
تم تغطية الحروف: ${[...coveredSet].join(" + ")} <br>
الحروف الناقصة: ${missing.join(" + ") || "لا يوجد"}
</div>
`;
}
