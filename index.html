const allNames = rawNames;

// 🔁 وزن التكرار
const freqMap = {};
allNames.forEach(n=>{
  freqMap[n] = (freqMap[n] || 0) + 1;
});

const single = allNames.filter(n=>!n.includes(" "));

// 🔧 normalize
function normalize(str){
  return str.replace(/[ًٌٍَُِّْ]/g,'')
  .replace(/[أإآ]/g,'ا')
  .replace(/^ال/,'')
  .replace(/\s/g,'');
}

// 🔊 التطابق الصوتي (بداية)
function prefixMatchLen(a,b){
  let i=0;
  while(i<a.length && i<b.length && a[i]===b[i]) i++;
  return i;
}

// 🧠 التقييم
function scoreName(name,input,covered=[]){

  const p = normalize(name);
  let score = 0;

  // التسلسل
  let seq = 0;
  let i = 0;
  for(let c of p){
    if(c === input[i]){
      seq++;
      i++;
    }
  }

  // الحروف الناقصة
  let newCoverage = 0;
  for(let ch of input){
    if(p.includes(ch) && !covered.includes(ch)){
      newCoverage++;
    }
  }

  // 🔥 أولوية التغطية + التسلسل
  if(newCoverage > 0){
    score += newCoverage * 12;
    score += seq * 6;
  }

  // 🔊 التطابق الصوتي
  const prefixLen = prefixMatchLen(p, input);
  score += prefixLen * 5;
  if(prefixLen >= 2) score += 5;
  if(prefixLen === 0) score -= 3;

  // 🧹 نظافة الاسم (الأقصر/الأخف أفضل)
  score += (newCoverage / p.length) * 8;
  score -= p.length * 0.3;

  // حروف مشتركة عامة
  for(let ch of input){
    if(p.includes(ch)) score += 2;
  }

  // وزن التكرار
  score += (freqMap[name] - 1);

  return score;
}

// اختيار أفضل مع منع تكرار نفس الاسم
function pickBest(list,input,covered=[],used=[]){
  let best=null, max=-1;

  for(let n of list){
    if(used.includes(n)) continue;

    const s = scoreName(n,input,covered);
    if(s > max){
      max = s;
      best = n;
    }
  }
  return best;
}

// تلوين
function highlight(name,input){
  let r="";
  if(name.startsWith("ال")){
    r+="ال"; name=name.slice(2);
  }
  for(let ch of name){
    if(input.includes(ch)) r+=`<span class="highlight">${ch}</span>`;
    else r+=ch;
  }
  return r;
}

// شرح
function explainSmart(name,input,role){
  const p = normalize(name);
  const letters = [];

  for(let ch of input){
    if(p.includes(ch)) letters.push(ch);
  }

  let text = "";

  if(role==="start")
    text += "يمثل بداية المثلث لأنه الأقرب صوتياً لبداية الاسم. ";

  if(role==="end")
    text += "يمثل نهاية المثلث وفق تطابق الحروف. ";

  if(role==="balance")
    text += "تم اختياره لإكمال التوازن وتغطية الحروف الناقصة. ";

  if(letters.length)
    text += "يغطي الحروف: " + letters.join(" + ") + ". ";

  return text;
}

// التشغيل
function run(){

  const input = normalize(document.getElementById("nameInput").value);
  if(!input) return;

  const used = [];

  // الأول
  const n1 = pickBest(single,input,[],used);
  used.push(n1);

  // الثاني
  const n2 = pickBest(single,input,[],used);
  used.push(n2);

  // تغطية
  const covered = [];
  [n1,n2].forEach(n=>{
    const p=normalize(n);
    for(let ch of input){
      if(p.includes(ch)) covered.push(ch);
    }
  });

  // الثالث (يغطي النقص)
  const n3 = pickBest(single,input,covered,used);

  // تحليل
  const coveredSet = new Set();
  [n1,n2,n3].forEach(n=>{
    const p=normalize(n);
    for(let ch of input){
      if(p.includes(ch)) coveredSet.add(ch);
    }
  });

  const allLetters = [...input];
  const coveredLetters = [...coveredSet];
  const missing = allLetters.filter(c=>!coveredSet.has(c));

  document.getElementById("result").innerHTML = `
  <div class="triangle">
  <svg width="340" height="280">
  <polygon points="170,20 320,250 20,250"
  style="fill:none;stroke:#00ffcc;stroke-width:2"/>
  </svg>

  <div class="point top">${highlight(n1,input)}</div>
  <div class="point right">${highlight(n2,input)}</div>
  <div class="point left">${highlight(n3,input)}</div>
  </div>

  <div class="cards">
  <div class="card"><h3>${n1}</h3><p>${explainSmart(n1,input,"start")}</p></div>
  <div class="card"><h3>${n2}</h3><p>${explainSmart(n2,input,"end")}</p></div>
  <div class="card"><h3>${n3}</h3><p>${explainSmart(n3,input,"balance")}</p></div>
  </div>

  <div class="summary">
  تم تغطية الحروف: ${coveredLetters.join(" + ")} <br>
  الحروف الأقل ظهورًا: ${missing.join(" + ") || "لا يوجد"}
  </div>
  `;
}
